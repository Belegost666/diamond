<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diamond - Mobile Ready</title>
    <style>
        :root { 
            --gold: #ffd700; 
            --cell: 80px; 
            --gap: 4px;   
        }
        
        /* Ajustements pour Mobile */
        @media (max-width: 500px) {
            :root {
                --cell: 14vw; /* Taille adaptative selon l'écran */
                --gap: 2px;
            }
            .stats-container { padding: 10px !important; }
            .stat-val { font-size: 1.1rem !important; }
            #spin-btn { width: 90%; padding: 15px !important; }
        }

        body { 
            background: radial-gradient(circle, #1a0a2a, #050505); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px; 
            margin: 0; 
            min-height: 100vh; 
            overflow-x: hidden;
        }
        .stats-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            width: 95%; 
            max-width: 500px; 
            background: rgba(0,0,0,0.8); 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            border: 1px solid #444; 
        }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; }
        .stat-val { font-size: 1.3rem; font-weight: bold; color: var(--gold); display: block; }
        
        .grid-frame { 
            padding: 6px; 
            background: #000; 
            border-radius: 8px; 
            border: 2px solid #333; 
            box-shadow: 0 0 30px #000; 
        }
        .machine { 
            display: grid; 
            grid-template-columns: repeat(6, var(--cell)); 
            grid-template-rows: repeat(5, var(--cell)); 
            gap: var(--gap); 
            background: #000; 
        }
        .cell { 
            width: var(--cell); 
            height: var(--cell); 
            background: #000; 
            border-radius: 4px; 
            border: 1px solid #1a1a1a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            transition: 0.2s; 
        }
        .cell img { 
            width: 90%; 
            height: 90%; 
            object-fit: contain; 
        }
        
        .win-active { border-color: var(--gold); box-shadow: inset 0 0 10px var(--gold); background: #1a1500; z-index: 5; }
        .star-active { border-color: #00e5ff; box-shadow: inset 0 0 8px #00e5ff; background: #000a0a; }
        .blur { filter: blur(4px) opacity(0.4); }
        
        #spin-btn, #reset-btn { 
            margin-top: 20px; 
            color: white; 
            padding: 15px 50px; 
            border: none; 
            border-radius: 50px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
            touch-action: manipulation; /* Optimise le clic sur mobile */
        }
        #spin-btn { background: linear-gradient(145deg, #ff4081, #c2185b); box-shadow: 0 5px 15px rgba(233, 30, 99, 0.3); }
        #spin-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }
        #reset-btn { background: linear-gradient(145deg, #444, #111); border: 1px solid #666; display: none; }
        
        .log { 
            margin-top: 15px; 
            width: 95%; 
            max-width: 500px; 
            background: #000; 
            padding: 10px; 
            height: 80px; 
            overflow-y: auto; 
            color: #39ff14; 
            font-family: monospace; 
            font-size: 0.75rem; 
            border: 1px solid #333; 
            border-radius: 8px; 
        }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="stat-item"><span class="stat-label">Lancers</span><span class="stat-val" id="rolls">4</span></div>
        <div class="stat-item"><span class="stat-label">Étoiles</span><span class="stat-val" id="stars">0/3</span></div>
        <div class="stat-item"><span class="stat-label">Temps</span><span class="stat-val" id="time">0 min</span></div>
    </div>

    <div class="grid-frame">
        <div class="machine" id="machine"></div>
    </div>

    <button id="spin-btn">LANCER</button>
    <button id="reset-btn">REJOUER</button>

    <div class="log" id="log">> Interface mobile activée.</div>

    <script>
        const SYMBOLS_DATA = [
            { type: 'pink',   img: 'rose.png',   char: '🌸', val: 2,  proba: 0.25 },
            { type: 'green',  img: 'vert.png',   char: '🟢', val: 5,  proba: 0.15 },
            { type: 'orange', img: 'orange.png', char: '🟠', val: 12, proba: 0.12 },
            { type: 'purple', img: 'violet.png', char: '🟣', val: 20, proba: 0.08 },
            { type: 'red',    img: 'rouge.png',  char: '🔴', val: 0,  proba: 0.05 },
            { type: 'blue',   img: 'bleu.png',   char: '🔵', val: 0,  proba: 0.05 }
        ];

        let state = { rolls: 4, stars: 0, time: 0, multiplier: 1, spinning: false, abstinence: false, canEnjoy: false };

        function initGrid() {
            const m = document.getElementById('machine'); m.innerHTML = '';
            for(let i=0; i<30; i++) {
                const c = document.createElement('div'); c.className = 'cell'; c.id = `c-${i}`;
                m.appendChild(c);
            }
        }
        initGrid();

        async function spin() {
            if (state.spinning || state.rolls <= 0) return;
            state.spinning = true; state.rolls--; updateUI();
            addLog("Tirage...");

            let currentWin = null;
            let randGain = Math.random();
            let threshold = 0;
            
            for (let win of SYMBOLS_DATA) {
                threshold += win.proba;
                if (randGain < threshold) {
                    currentWin = win;
                    break;
                }
            }

            let grid = generateGridWithWin(currentWin);

            // Injections bonus
            if (Math.random() < 0.12) injectBonus(grid, 'etoile.jpg', 'star');
            if (Math.random() < 0.04) injectBonus(grid, 'diable.jpg', 'devil'); 
            if (Math.random() < 0.06) injectBonus(grid, '+1.jpg', 'plus1');
            if (Math.random() < 0.02) injectBonus(grid, '+2.jpg', 'plus2');

            const cells = Array.from(document.getElementsByClassName('cell'));
            cells.forEach(c => {
                c.classList.remove('win-active', 'star-active');
                c.innerHTML = ''; 
            });

            for(let i=0; i<30; i++) {
                const c = document.getElementById(`c-${i}`);
                c.classList.add('blur');
                setTimeout(() => {
                    const sym = grid[Math.floor(i/6)][i%6];
                    if(sym.img) {
                        const img = document.createElement('img');
                        img.src = sym.img;
                        c.appendChild(img);
                    } else {
                        c.innerText = sym.char;
                    }
                    c.classList.remove('blur');
                }, i * 12); // Accélération légère pour mobile
            }

            setTimeout(() => {
                applyResults(grid, currentWin);
                state.spinning = false;
                updateUI();
                if(state.rolls <= 0) endGame();
            }, 700);
        }

        function generateGridWithWin(winSymbol) {
            let g = Array(5).fill().map(() => Array(6).fill(null));
            if (winSymbol) {
                const mode = Math.floor(Math.random() * 4); 
                let r, c;
                if(mode === 0) { // H
                    r = Math.floor(Math.random()*5); c = Math.floor(Math.random()*4);
                    g[r][c] = g[r][c+1] = g[r][c+2] = {...winSymbol, isWin: true};
                } else if(mode === 1) { // V
                    r = Math.floor(Math.random()*3); c = Math.floor(Math.random()*6);
                    g[r][c] = g[r+1][c] = g[r+2][c] = {...winSymbol, isWin: true};
                } else if(mode === 2) { // \
                    r = Math.floor(Math.random()*3); c = Math.floor(Math.random()*4);
                    g[r][c] = g[r+1][c+1] = g[r+2][c+2] = {...winSymbol, isWin: true};
                } else { // /
                    r = Math.floor(Math.random()*2) + 2; c = Math.floor(Math.random()*4);
                    g[r][c] = g[r-1][c+1] = g[r-2][c+2] = {...winSymbol, isWin: true};
                }
            }

            for(let r=0; r<5; r++) {
                for(let c=0; c<6; c++) {
                    if (g[r][c]) continue;
                    let possible = SYMBOLS_DATA.filter(s => {
                        if (c >= 1 && g[r][c-1] && g[r][c-1].type === s.type) return false;
                        if (r >= 1 && g[r-1][c] && g[r-1][c].type === s.type) return false;
                        return true;
                    });
                    g[r][c] = {...possible[Math.floor(Math.random()*possible.length)], isWin: false};
                }
            }
            return g;
        }

        function injectBonus(grid, imgSrc, type) {
            let r = Math.floor(Math.random()*5); let c = Math.floor(Math.random()*6);
            if (!grid[r][c].isWin) {
                grid[r][c] = { img: imgSrc, type: type, isWin: false, isBonus: true };
            }
        }

        function applyResults(grid, win) {
            grid.flat().forEach((s, i) => {
                const cell = document.getElementById(`c-${i}`);
                if(s.type === 'star') { state.stars++; addLog("⭐ Étoile !"); cell.classList.add('star-active'); }
                if(s.type === 'devil') { state.multiplier = 2; addLog("😈 DIABLE (x2)"); cell.classList.add('win-active'); }
                if(s.type === 'plus1') { state.rolls += 1; addLog("+1 Lancer"); }
                if(s.type === 'plus2') { state.rolls += 2; addLog("+2 Lancers"); }
                if(s.isWin) cell.classList.add('win-active');
            });

            if(win) {
                state.time += win.val;
                if(win.type === 'red') { state.abstinence = true; addLog(`Gain: ${win.char} (🛑 ABSTINENCE)`); }
                else if(win.type === 'blue') { state.canEnjoy = true; addLog(`Gain: ${win.char} (💦 JOUISSANCE)`); }
                else { addLog(`Gain: ${win.char} (+${win.val}m)`); }
            }
        }

        function updateUI() {
            document.getElementById('rolls').innerText = state.rolls;
            document.getElementById('stars').innerText = state.stars + "/3";
            document.getElementById('time').innerText = (state.time * state.multiplier) + " min";
            document.getElementById('spin-btn').disabled = state.spinning || state.rolls <= 0;
            document.getElementById('spin-btn').style.display = (state.rolls <= 0 && !state.spinning) ? "none" : "block";
        }

        function addLog(t) { const l = document.getElementById('log'); l.innerHTML += `<br>> ${t}`; l.scrollTop = l.scrollHeight; }

        function endGame() {
            const f = state.time * state.multiplier;
            let m = `<br><strong style="color:var(--gold)">SESSION TERMINEE</strong><br>Temps : ${f} min.`;
            if(state.abstinence) m += "<br>🛑 ABSTINENCE 24H.";
            else m += (state.canEnjoy || state.stars >= 3) ? "<br>💦 JOUISSANCE AUTORISÉE ! 💦" : "<br>🔒 ORGASME INTERDIT.";
            addLog(m);
            document.getElementById('reset-btn').style.display = "block";
        }

        function resetGame() {
            state = { rolls: 4, stars: 0, time: 0, multiplier: 1, spinning: false, abstinence: false, canEnjoy: false };
            document.getElementById('reset-btn').style.display = "none";
            document.getElementById('log').innerHTML = "> Nouvelle partie.";
            initGrid();
            updateUI();
        }

        document.getElementById('spin-btn').addEventListener('click', spin);
        document.getElementById('reset-btn').addEventListener('click', resetGame);
    </script>
</body>
</html>
