<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diamond - V22</title>
    <style>
        :root { 
            --gold: #ffd700; 
            --cell: 80px; 
            --gap: 4px;   
        }
        
        @media (max-width: 500px) {
            :root {
                --cell: 14.5vw;
                --gap: 3px;
            }
            .stats-container { margin-bottom: 10px !important; }
            #spin-btn, #reset-btn { width: 85% !important; padding: 16px !important; margin-top: 15px !important; }
            .log { height: 100px !important; font-size: 0.8rem !important; width: 90% !important; }
        }

        body { 
            background: radial-gradient(circle, #1a0a2a, #050505); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px; 
            margin: 0; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        .stats-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            width: 95%; 
            max-width: 500px; 
            background: rgba(0,0,0,0.85); 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #333; 
        }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--gold); display: block; }
        
        .grid-frame { 
            padding: 6px; 
            background: #111; 
            border-radius: 10px; 
            border: 2px solid #222; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
        }
        .machine { 
            display: grid; 
            grid-template-columns: repeat(6, var(--cell)); 
            grid-template-rows: repeat(5, var(--cell)); 
            gap: var(--gap); 
        }
        .cell { 
            width: var(--cell); 
            height: var(--cell); 
            background: #000; 
            border-radius: 4px; 
            border: 1px solid #1a1a1a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        .cell img { width: 85%; height: 85%; object-fit: contain; }
        
        .win-active { border-color: var(--gold); box-shadow: inset 0 0 12px var(--gold); background: #1a1500; }
        .star-active { border-color: #00e5ff; box-shadow: inset 0 0 10px #00e5ff; background: #000a0a; }
        .blur { filter: blur(4px) opacity(0.3); }
        
        /* Boutons */
        #spin-btn, #reset-btn { 
            width: 300px;
            margin-top: 25px; 
            color: white; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.3rem; 
            font-weight: 800; 
            cursor: pointer; 
            transition: transform 0.1s, filter 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #spin-btn { 
            background: linear-gradient(180deg, #ff4081, #880e4f); 
            box-shadow: 0 4px 0 #560027, 0 8px 15px rgba(0,0,0,0.4); 
        }
        #spin-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #560027; }
        #spin-btn:disabled { background: #333; color: #555; box-shadow: none; cursor: not-allowed; transform: none; }
        
        #reset-btn { 
            background: linear-gradient(180deg, #444, #222); 
            border: 1px solid #555; 
            display: none; 
        }

        /* Log façon Terminal */
        .log { 
            margin-top: auto; /* Pousse le log vers le bas */
            margin-bottom: 10px;
            width: 95%; 
            max-width: 500px; 
            background: rgba(0,0,0,0.9); 
            padding: 12px; 
            height: 90px; 
            overflow-y: auto; 
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            font-size: 0.8rem; 
            border-top: 1px solid #222; 
            border-radius: 4px;
            box-shadow: inset 0 0 10px #000;
        }
        .log b { color: var(--gold); }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="stat-item"><span class="stat-label">Lancers</span><span class="stat-val" id="rolls">4</span></div>
        <div class="stat-item"><span class="stat-label">Étoiles</span><span class="stat-val" id="stars">0/3</span></div>
        <div class="stat-item"><span class="stat-label">Temps</span><span class="stat-val" id="time">0 min</span></div>
    </div>

    <div class="grid-frame">
        <div class="machine" id="machine"></div>
    </div>

    <button id="spin-btn">Lancer</button>
    <button id="reset-btn">Rejouer</button>

    <div class="log" id="log">> Système prêt. Bonne chance.</div>

    <script>
        const SYMBOLS_DATA = [
            { type: 'pink',   img: 'rose.png',   val: 2,  proba: 0.25 },
            { type: 'green',  img: 'vert.png',   val: 5,  proba: 0.15 },
            { type: 'orange', img: 'orange.png', val: 12, proba: 0.12 },
            { type: 'purple', img: 'violet.png', val: 20, proba: 0.08 },
            { type: 'red',    img: 'rouge.png',  val: 0,  proba: 0.05 },
            { type: 'blue',   img: 'bleu.png',   val: 0,  proba: 0.05 }
        ];

        let state = { rolls: 4, stars: 0, time: 0, multiplier: 1, spinning: false, abstinence: false, canEnjoy: false };

        function initGrid() {
            const m = document.getElementById('machine'); m.innerHTML = '';
            for(let i=0; i<30; i++) {
                const c = document.createElement('div'); c.className = 'cell'; c.id = `c-${i}`;
                m.appendChild(c);
            }
        }
        initGrid();

        async function spin() {
            if (state.spinning || state.rolls <= 0) return;
            state.spinning = true; state.rolls--; updateUI();
            addLog("Lancement des rouleaux...");

            let currentWin = null;
            let randGain = Math.random();
            let threshold = 0;
            
            for (let win of SYMBOLS_DATA) {
                threshold += win.proba;
                if (randGain < threshold) {
                    currentWin = win;
                    break;
                }
            }

            let grid = generateGridWithWin(currentWin);

            if (Math.random() < 0.12) injectBonus(grid, 'etoile.png', 'star');
            if (Math.random() < 0.05) injectBonus(grid, 'diable.png', 'devil'); 
            if (Math.random() < 0.06) injectBonus(grid, '+1.png', 'plus1');
            if (Math.random() < 0.02) injectBonus(grid, '+2.png', 'plus2');

            const cells = Array.from(document.getElementsByClassName('cell'));
            cells.forEach(c => {
                c.classList.remove('win-active', 'star-active');
                c.innerHTML = ''; 
            });

            for(let i=0; i<30; i++) {
                const c = document.getElementById(`c-${i}`);
                c.classList.add('blur');
                setTimeout(() => {
                    const sym = grid[Math.floor(i/6)][i%6];
                    if(sym.img) {
                        const img = document.createElement('img');
                        img.src = sym.img;
                        c.appendChild(img);
                    }
                    c.classList.remove('blur');
                }, i * 15);
            }

            setTimeout(() => {
                applyResults(grid, currentWin);
                state.spinning = false;
                updateUI();
                if(state.rolls <= 0) endGame();
            }, 800);
        }

        function generateGridWithWin(winSymbol) {
            let g = Array(5).fill().map(() => Array(6).fill(null));
            if (winSymbol) {
                const mode = Math.floor(Math.random() * 4); 
                let r, c;
                if(mode === 0) { // H
                    r = Math.floor(Math.random()*5); c = Math.floor(Math.random()*4);
                    g[r][c] = g[r][c+1] = g[r][c+2] = {...winSymbol, isWin: true};
                } else if(mode === 1) { // V
                    r = Math.floor(Math.random()*3); c = Math.floor(Math.random()*6);
                    g[r][c] = g[r+1][c] = g[r+2][c] = {...winSymbol, isWin: true};
                } else if(mode === 2) { // \
                    r = Math.floor(Math.random()*3); c = Math.floor(Math.random()*4);
                    g[r][c] = g[r+1][c+1] = g[r+2][c+2] = {...winSymbol, isWin: true};
                } else { // /
                    r = Math.floor(Math.random()*2) + 2; c = Math.floor(Math.random()*4);
                    g[r][c] = g[r-1][c+1] = g[r-2][c+2] = {...winSymbol, isWin: true};
                }
            }

            for(let r=0; r<5; r++) {
                for(let c=0; c<6; c++) {
                    if (g[r][c]) continue;
                    let possible = SYMBOLS_DATA.filter(s => {
                        if (c >= 1 && g[r][c-1] && g[r][c-1].type === s.type) return false;
                        if (r >= 1 && g[r-1][c] && g[r-1][c].type === s.type) return false;
                        return true;
                    });
                    g[r][c] = {...possible[Math.floor(Math.random()*possible.length)], isWin: false};
                }
            }
            return g;
        }

        function injectBonus(grid, imgSrc, type) {
            let r = Math.floor(Math.random()*5); let c = Math.floor(Math.random()*6);
            if (!grid[r][c].isWin) grid[r][c] = { img: imgSrc, type: type, isWin: false };
        }

        function applyResults(grid, win) {
            grid.flat().forEach((s, i) => {
                const cell = document.getElementById(`c-${i}`);
                if(s.type === 'star') { state.stars++; addLog("<b>⭐ ETOILE</b> trouvée !"); cell.classList.add('star-active'); }
                if(s.type === 'devil') { state.multiplier = 2; addLog("<b>😈 DIABLE</b> : Gains x2 !"); cell.classList.add('win-active'); }
                if(s.type === 'plus1') { state.rolls += 1; addLog("<b>+1 Lancer</b> bonus"); }
                if(s.type === 'plus2') { state.rolls += 2; addLog("<b>+2 Lancers</b> bonus"); }
                if(s.isWin) cell.classList.add('win-active');
            });

            if(win) {
                state.time += win.val;
                if(win.type === 'red') { state.abstinence = true; addLog("🔴 Alignement Rouge : <b>ABSTINENCE</b>"); }
                else if(win.type === 'blue') { state.canEnjoy = true; addLog("🔵 Alignement Bleu : <b>JOUISSANCE</b>"); }
                else { addLog(`Alignement validé : <b>+${win.val} min</b>`); }
            }
        }

        function updateUI() {
            document.getElementById('rolls').innerText = state.rolls;
            document.getElementById('stars').innerText = state.stars + "/3";
            document.getElementById('time').innerText = (state.time * state.multiplier) + " min";
            document.getElementById('spin-btn').disabled = state.spinning || state.rolls <= 0;
            if(state.rolls <= 0 && !state.spinning) document.getElementById('spin-btn').style.display = "none";
        }

        function addLog(t) { 
            const l = document.getElementById('log'); 
            l.innerHTML += `<br>> ${t}`; 
            l.scrollTop = l.scrollHeight; 
        }

        function endGame() {
            const f = state.time * state.multiplier;
            let m = `<br><b>--- SESSION TERMINEE ---</b><br>Score : ${f} min.`;
            if(state.abstinence) m += "<br>🛑 ABSTINENCE OBLIGATOIRE (24H).";
            else m += (state.canEnjoy || state.stars >= 3) ? "<br>💦 JOUISSANCE AUTORISÉE !" : "<br>🔒 ORGASME INTERDIT.";
            addLog(m);
            document.getElementById('reset-btn').style.display = "block";
        }

        function resetGame() {
            state = { rolls: 4, stars: 0, time: 0, multiplier: 1, spinning: false, abstinence: false, canEnjoy: false };
            document.getElementById('reset-btn').style.display = "none";
            document.getElementById('spin-btn').style.display = "block";
            document.getElementById('log').innerHTML = "> Nouvelle partie lancée.";
            initGrid();
            updateUI();
        }

        document.getElementById('spin-btn').addEventListener('click', spin);
        document.getElementById('reset-btn').addEventListener('click', resetGame);
    </script>
</body>
</html>
